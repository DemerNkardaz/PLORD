[mod-setting-description]
PLORD_inv_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса инвентаря в горизонтальные стороны. Полезно с модами, расширяющими вместительность инвентаря, позволяя уместить больше слотов на экране одновременно. Стандартное значение мода - 14, Ванильной игры - 10.
PLORD_prd_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса производства в горизонтальные стороны. Полезно с модами или наборами, добавляющими много создаваемых предметов. Стандартное значение мода - 14, Ванильной игры - 10.
PLORD_grp_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса персональной логистики в горизонтальные стороны. Стандартное значение мода - 14, Ванильной игры - 10.

[mod-name]
PLORD=Пласторданция

[mod-description]
PLORD=Добавление новых ресурсов и производств.\n\nНеобязательные моды рекомендуемы к установке вместе с данным модом, так как дополняют его и подходят общей задумке, усложняя или облегчая разные задачи, особенно Clockwork, Alien Biomes, Cannal Builder, Rampant Fixed, Abandoned Ruins, Tral robot tree farm.

