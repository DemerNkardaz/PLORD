[item-description]
PLORD_uranium_ingot=[color=#8bf9b6]U [92][/color]\nКруглый слиток из металлического урана, содержащий в основном изотоп U—238, а так же доли U—235, U—236, U—234.
PLORD_uranium_ingot_enriched=[color=#8bf9b6]U—235 [92][/color]\nЦилиндрические слитки обогащённого урана в соединении, содержащие большую долю U—235 и пригодные для использования в ядерной энергетике и вооружении.
PLORD_uranium_ingot_depleted=[color=#8fe42c]U—238 [92][/color]\nЦилиндрические слитки, практически полностью состоящие лишь из изотопа U—238 и пригодные для производств, требующих материалов высокой плотности.
PLORD_uranium_plate=[color=#8fe42c]U—238 [92][/color]\nПлита из обеднённого урана.
PLORD_aurotitan_uranium_stick=Надёжный топливный стержень для продвинутого уранового реактора.

