[mod-name]
AbandonedRuins=Пласторданция → Заброшенные Руины

[mod-description]
AbandonedRuins=The Ruins Mod добавляет случайно спавнящиеся руины в мир. Эти руины - разрушенные фрагменты баз, фортов, малых оазисов и многое другое.\nИсследуй их для получения лута, приключения или развлечения, но будь осторожен, некоторые из руин обладают защитными системами от предыдущего игрока, приземлившегося на планете, и более успешные колонии имеют лучшую защиту.
