[mod-setting-name]
distant-range=Дистанция слабых тиков
middle-range=Дистанция средних тиков
close-range=Дистанция частых тиков
distant-volume=Значение тиков дальней дистанции
middle-volume=Значение тиков средней дистанции
close-volume=Значение тиков близкой дистанции

[mod-setting-description]
distant-range=Дальняя дистанция, на которой происходит фиксация радиоактивного излучения слабыми тиками.
middle-range=Средняя дистанция для тиков счётчика средней частоты.
close-range=Близкая дистанция, когда тики счётчика максимальны (если значение тиков близкой дистанции стоит по умолчанию).
distant-volume=Значение частоты тиков счётчика на дальней дистанции.
middle-volume=Значение частоты тиков счётчика на средней дистанции.
close-volume=Значение частоты тиков счётчика на близкой дистанции.

[mod-name]
uranium_geiger=Пласторданция → Счётчик Гейгера-Мюллера

[mod-description]
uranium_geiger=Добавляет звуковой эффект счётчика Гейгера при приближении к урановым рудам.
