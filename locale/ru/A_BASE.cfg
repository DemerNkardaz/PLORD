[mod-setting-description]
PLORD_inv_size_cstm=Определяет базовую вместительность инвентаря игрока\nЗначение по умолчанию Факторио - 80, в моде - 100.
PLORD_inv_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса инвентаря в горизонтальные стороны. Полезно с модами, расширяющими вместительность инвентаря, позволяя уместить больше слотов на экране одновременно. Стандартное значение мода - 14, Ванильной игры - 10.
PLORD_prd_w_cstm=Не рекомендуется использовать значения ниже 14\nПозволяет расширить (или уменьшить) окно интерфейса производства в горизонтальные стороны. Полезно с модами или наборами, добавляющими много создаваемых предметов. Стандартное значение мода - 14, Ванильной игры - 10.
PLORD_grp_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса персональной логистики в горизонтальные стороны. Стандартное значение мода - 14, Ванильной игры - 10.
PLORD_enable_craft_nuclear_boiler=Активирует возможность создавать [img=item.PLORD_nuclear_boiler][color=#00ff00]Ядерный бойлер[/color], питающийся [img=item.uranium-fuel-cell][color=#00ff00]Урановым топливным элементом[/color].\nЧитерный предмет, но всегда доступен в редакторе (~/editor).
PLORD_enable_craft_nuclear_boiler_powerness=Позволяет настроить мощность [img=item.PLORD_nuclear_boiler][color=#00ff00]Ядерного бойлера[/color], сделав его более сбалансированным или чрезмерно имбалансным.
PLORD_enable_craft_nuclear_boiler_powerness_type=Указывает, какую именно категорию мощности будет использовать [img=item.PLORD_nuclear_boiler][color=#00ff00]Ядерный бойлер[/color]:\nW - Ватт\nkW - Киловатт 10³\nMW - Мегаватт 10⁶\nGW - Гигаватт 10⁹\nTW - Тераватт 10¹²\nPW - Петаватт 10¹⁵\nEW - Эксаватт 10¹⁸\nZW - Зеттаватт 10²¹\nYW - Йоттаватт 10²⁴
PLORD_biter_loot_toggle=Активирует выпадение лута из убитых кусак и плевак.\nНе затрагивает биологическую добычу, как мозги, конечности и т.д., предметы лута спавнятся рядом с трупом.\nПредметы лута обширны, в основном состоящие из природных ресурсов (древесина, камни и т.д.), которые кусака или плевака мог случайно перепутать с едой...\nЕсли включен мод The Ruins Mod в таблицу лута добавляются технические компоненты.\nФункция должна быть совместима с аналогичными из других модов, так как использует метод [color=#82eaf6]table.insert[/color] вместо прямого указания списка, но если нет - просто отключите эту функцию.
PLORD_biter_loot_toggle_DNA=Несколько читерно.\nОблегчает исследования биологической ветви технологий, позволяя с установленным шансом, минимальным и максимальным количеством получать ДНК кусак и плевак как лут.\nНе требует активацию функции выше.
PLORD_biter_loot_DNA_maxcount=Параметр, отвечающий за максимально возможное количество лута ДНК с одного кусаки или плеваки.
PLORD_biter_loot_DNA_mincount=Параметр, отвечающий за минимально возможное количество лута ДНК с одного кусаки или плеваки.
PLORD_biter_loot_DNA_prob=Параметр, отвечающий за шанс на появление лута ДНК с одного кусаки или плеваки.

PLORD_res_cstm_blue_cobalt=[img=item.dummy_icon_cobalt_ingot_gen] → [img=item.dummy_icon_cobalt_ingot_blu] [color=#c7e2ff]Кобальтовый Слиток[/color]\nДелает металлический кобальт синим, подобно его соединениям для облегчения визуального разделения с другими металлами.
PLORD_res_cstm_green_idnium=[img=item.dummy_icon_indium_ingot_gen] → [img=item.dummy_icon_indium_ingot_gre] [color=#c7ffc8]Индиевый Слиток[/color]\nДелает зелёный цвет металлического индия более насыщенным для облегчения визуального разделения с другими металлами.
PLORD_res_cstm_lavandula_manganese=[img=item.dummy_icon_manganese_ingot_gen] → [img=item.dummy_icon_manganese_ingot_lav] [color=#f1e6ee]Марганцевый Слиток[/color]\nДелает металлический марганец светло-лавандового цвета, отсылая к его нитрату для облегчения визуального разделения с другими металлами.
PLORD_res_cstm_red_nickel=[img=item.dummy_icon_nickel_ingot_gen] → [img=item.dummy_icon_nickel_ingot_red] [color=#dc3813]Никелевый Слиток[/color]\nДелает металлический никель красного цвета, подобно его хромату для облегчения визуального разделения с другими металлами.
PLORD_res_cstm_luminiscent_uranium=[img=item.dummy_icon_uranium_ingot_gen] → [img=item.dummy_icon_uranium_ingot_lum] [color=#40ff62]Урановый Слиток[/color]\nДелает металлический уран зелёным,светящимся цветом для облегчения визуального разделения с другими металлами.

PLORD_glowing_belts=Делает цветные элементы конвейеров светящимися.
PLORD_bodycolor_belts=Делает ленту конвейера полностью цветной.

PLORD_res_cstm_stack_ingots=Определяет вместимость одной стопки слитков для всех металлов.\nПо умолчанию — 50.

[mod-name]
PLORD=Пласторданция

[mod-description]
PLORD=Добавление новых ресурсов и производств.\n\nНеобязательные моды рекомендуемы к установке вместе с данным модом, так как дополняют его и подходят общей задумке, усложняя или облегчая разные задачи, особенно Clockwork, Alien Biomes, Cannal Builder, Rampant Fixed, Abandoned Ruins, Tral robot tree farm.

[controls]
PLORD_flashlight_t=Горячая клавиша вкл/выкл фонарика