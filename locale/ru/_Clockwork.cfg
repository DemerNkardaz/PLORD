[mod-setting-description]
Clockwork-cycle-length=⚠ Пласторданция: Базовое значение установлено на 5 (~34:47 минут-секунд)\nМножитель длительности дневного цикла. Базовое значение игры - 6 мин. 56.6 сек. Пример: установление данной настройки в значение 4 выдаст результат в 27 мин. 47 сек. длительности дневного цикла.\nПредупреждение: изменять данное значение можно в любое время, однако модификатор объёма аккумуляторов требует перезапуска клиента игры.
Clockwork-dusk=⚠ Пласторданция: Базовое значение установлено на 0.1 (Закат происходит на ~3:28 минуте дневного цикла)\nЗначение времени, когда происходит закат. Это значение не может быть равно вышестоящему, все они должны быть установлены в правильном порядке:\nЗакат → Ночь → Восход → День.\nПо умолчанию (для базового Clockwork), 0.5 (середина между ночью и восходом) - полночь.
Clockwork-evening=⚠ Пласторданция: Базовое значение установлено на 0.15 (Ночь наступает на ~5:12 минуте дневного цикла)\nЗначение времени, когда наступает ночь. Ночь становится темнее после этого времени. Что бы сделать ночи длинее, установите значения ночи и восхода дальше друг от друга, короче - наоборот.
Clockwork-morning=⚠ Пласторданция: Базовое значение установлено на 0.6 (Солнце восходит на ~20:48 минуте дневного цикла)\nЗначение времени, когда происходит восход солнца. Самый тёмный отрезок ночи заканчивается при восходе.
Clockwork-dawn=⚠ Пласторданция: Базовое значение установлено на 0.7 (День наступает на ~24:17 минуте дневного цикла)\nЗначение времени, когда наступает день.
Clockwork-permanight=Режим вечной ночи.\nОтключите во время запущенной карты дял возвращения к нормальную дневному циклу.
Clockwork-starttime=⚠ Пласторданция: Базовое значение установлено на 0.15 (Старт сразу в наступление ночи)\nЗначение времени дневного цикла при запуске новой игры. Это значение не должно быть равно ночи если вы используете "Grace Before First Night".
Clockwork-mod-accumulators=Регулирует ёмкость аккумуляторов, делая её пропорциональной новой продолжнотельности дневного цикла.
Clockwork-mod-accumulators-capacity=Множитель объёма аккумуляторов. Обычно это значение должно быть то же, что и «Дневной цикл», но существует как отдельная настройка, поскольку аккумуляторы не могут быть изменены динамически.
Clockwork-enable-flares=Делает доступными в ранней игре источник света: капсулы сигнального огня, которые можно бросать. Длительность изменяется со значение множителя объёма аккумуляторов.
Clockwork-flares-simple=Упрощает рецепт сигнальных огней, убирая из них электронные схемы. Предназначено для модов, усложняющих их создание (Bob, Angels, Krastorio, Py, Dyworld и пр.), поскольку капсулы предназначены для создания освещения при ранней игре.
Clockwork-disable-nv=Отключает рецепт и технологию ночного зрения силовой брони. Факторио будет вылетать, если не будет существовать предмета экипировки ночного зрения, поэтому, если этот параметр включен в запущенной игре, уже созданный предмет экипировки становится инертным, а не удаляется.
Clockwork-darknight=Ночи теперь полностью черны - ничего не видно без источников света.
Clockwork-darknight-percent=⚠ Пласторданция: Базовое значение установлено на 100% (Полная тьма)\nПозволяет изменять процент уровня тьмы ночью.\n\n100% - кромешная тьма, 0% - стандартная тьма Факторио.

[mod-name]
Clockwork=Пласторданция → Clockwork

[mod-description]
Clockwork=⚠ Пласторданция меняет некоторые значения мода.\nИзменяет параметры солнечного цикла - делайте дни длиннее или короче и контролируйте, какая часть цикла приходится на ночь. Сделайте ночи темнее, если хотите. Включает дополнительный режим «Солнце никогда не восходит».