[mod-setting-description]
plardance_inv_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса инвентаря в горизонтальные стороны. Полезно с модами, расширяющими вместительность инвентаря, позволяя уместить больше слотов на экране одновременно. Стандартное значение мода - 18, Ванильной игры - 10.
plardance_prd_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса производства в горизонтальные стороны. Полезно с модами или наборами, добавляющими много создаваемых предметов. Стандартное значение мода - 18, Ванильной игры - 10.
plardance_grp_w_cstm=Позволяет расширить (или уменьшить) окно интерфейса персональной логистики в горизонтальные стороны. Стандартное значение мода - 18, Ванильной игры - 10.

